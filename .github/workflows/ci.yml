name: CI

# Runs quality gates on every push and pull request: type checking, linting,
# the full test suite with coverage thresholds, and a production build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Build must succeed without secrets; the app falls back gracefully.
          GEMINI_API_KEY: ""
